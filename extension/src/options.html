<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>DetectorIA — Configuración</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <header>
      <span class="logo">🔍</span>
      <h1>DetectorIA</h1>
    </header>

    <div class="options-wrap">

      <div class="field">
        <label for="groqApiKey">API Key de Groq</label>
        <input id="groqApiKey" type="password" placeholder="gsk_…" autocomplete="off" />
        <p class="hint">
          Obtén tu clave gratuita en
          <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a>
        </p>
      </div>

      <div class="field">
        <label for="groqModel">Modelo</label>
        <select id="groqModel" style="width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B (recomendado)</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 8B (más rápido)</option>
          <option value="gemma2-9b-it">Gemma 2 9B</option>
          <option value="llama-3.2-11b-vision-preview">Llama 3.2 Vision (solo imágenes)</option>
        </select>
      </div>

      <div class="field">
        <label for="backendUrl">URL del servidor (opcional)</label>
        <input id="backendUrl" type="url" placeholder="https://detectoria-backend.onrender.com" autocomplete="off" />
        <p class="hint">
          Si configuras esta URL, el análisis usará Gemini vía tu servidor Flask
          en vez de Groq. Déjala vacía para usar Groq directamente.
        </p>
      </div>

      <button id="saveBtn" class="btn-save">Guardar configuración</button>
      <span id="savedMsg" class="saved-msg">✓ Guardado correctamente</span>

    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
